<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Eva-Núcleo | Login</title>
<style>
  * {margin:0; padding:0; box-sizing:border-box;}
  body, html { width:100%; height:100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
  canvas { position: fixed; top:0; left:0; z-index: -2; }
  .login-container {
    position: relative;
    z-index: 1;
    background: rgba(255, 240, 245, 0.9);
    padding: 50px 40px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    width: 360px;
    text-align: center;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
  }
  h1 { color: #ff69b4; font-weight:700; font-size:36px; letter-spacing:1px; margin-bottom:30px; }
  input[type="text"], input[type="password"] {
    width:100%; padding:14px 20px; margin:10px 0;
    border:2px solid #ffb6c1; border-radius:15px; background:#ffe4e1; outline:none; font-size:16px; transition:0.3s;
  }
  input[type="text"]:focus, input[type="password"]:focus { border-color:#ff69b4; background:#fff0f5; }
  button {
    width:100%; padding:14px; border-radius:15px; border:none;
    background:#ff69b4; color:white; font-size:18px; cursor:pointer; margin-top:20px; transition:0.3s;
  }
  button:hover { background:#ff85c1; }
  .error { color:red; margin-top:12px; font-weight:600; }
  .music-toggle {
    margin-top: 10px;
    font-size: 14px;
    color: #ff69b4;
    cursor: pointer;
    user-select: none;
  }
</style>
</head>
<body>

<!-- Música de fundo -->
<audio id="bg-music" loop>
  <source src="{{ url_for('static', filename='sombras-na-chuva.mp3') }}" type="audio/mpeg">
  Seu navegador não suporta áudio HTML5.
</audio>

<canvas id="background"></canvas>

<div class="login-container">
  <h1>Eva-Núcleo</h1>
  <form method="POST">
    <input type="text" name="username" placeholder="Usuário" required>
    <input type="password" name="password" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </form>
  <div class="music-toggle" id="music-toggle">🔊 Música: Ativada</div>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
</div>

<script>
// ===== Fundo partículas/moléculas =====
const canvas = document.getElementById("background");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const colors = ["#ffb6c1","#ff69b4","#ffc0cb","#ffe4e1"];

function Particle() {
  this.x = Math.random() * canvas.width;
  this.y = Math.random() * canvas.height;
  this.radius = Math.random() * 3 + 1;
  this.color = colors[Math.floor(Math.random()*colors.length)];
  this.vx = (Math.random()-0.5)*0.5;
  this.vy = (Math.random()-0.5)*0.5;
}
for(let i=0;i<150;i++) particles.push(new Particle());

// ===== Hélice de DNA =====
function drawDNA() {
  const time = Date.now() * 0.002;
  for(let y=0; y<canvas.height; y+=12){
    const x1 = canvas.width/2 + Math.sin(time + y*0.05)*60;
    const x2 = canvas.width/2 + Math.cos(time + y*0.05)*60;
    ctx.beginPath();
    ctx.arc(x1, y, 4, 0, Math.PI*2);
    ctx.fillStyle = '#ff69b4';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x2, y, 4, 0, Math.PI*2);
    ctx.fill();
    // linha conectando os dois lados
    ctx.beginPath();
    ctx.moveTo(x1, y);
    ctx.lineTo(x2, y);
    ctx.strokeStyle = 'rgba(255,105,180,0.3)';
    ctx.stroke();
  }
}

// ===== Desenho das partículas e DNA =====
function draw() {
  ctx.clearRect(0,0,canvas.width, canvas.height);

  // partículas
  for(let p of particles){
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    for(let q of particles){
      const dx = p.x - q.x;
      const dy = p.y - q.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 80){
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,105,180,' + (1-dist/80) + ')';
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(q.x,q.y);
        ctx.stroke();
      }
    }
    p.x += p.vx; p.y += p.vy;
    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;
  }

  // hélice DNA
  drawDNA();

  requestAnimationFrame(draw);
}
draw();

window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ===== Música segura =====
const music = document.getElementById("bg-music");
music.volume = 0.3;
let musicOn = true;

function startMusic(){ if(musicOn) music.play().catch(()=>console.log("Clique para iniciar a música")) }
document.body.addEventListener('click', startMusic, { once: true });
document.querySelector('form').addEventListener('submit', startMusic);

document.getElementById('music-toggle').addEventListener('click', ()=>{
  if(musicOn){ music.pause(); musicOn=false; document.getElementById('music-toggle').textContent="🔇 Música: Desativada"; }
  else { music.play(); musicOn=true; document.getElementById('music-toggle').textContent="🔊 Música: Ativada"; }
});
</script>

</body>
</html>
