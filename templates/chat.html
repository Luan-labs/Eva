<!DOCTYPE html>
<html>
<head>
    <title>EVA Transparência</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        #chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 75%;
            word-wrap: break-word;
        }

        .user {
            background: #0d6efd;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .bot {
            background: #e9ecef;
            color: black;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        #message {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ccc;
            font-size: 16px;
            outline: none;
        }

        .btn {
            margin-left: 8px;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 18px;
            color: white;
        }

        .send-btn {
            background: #0d6efd;
        }

        .audio-btn {
            background: #198754;
        }

        .recording {
            background: red !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

<header>
    EVA Transparência
</header>

<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="message" placeholder="Digite sua mensagem..." />
    <button class="btn audio-btn" id="micBtn">🎤</button>
    <button class="btn send-btn" onclick="sendMessage()">➤</button>
</div>

<script>

const chatBox = document.getElementById("chat-box");
const micBtn = document.getElementById("micBtn");

let recognition;
let isRecording = false;

function appendMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    appendMessage(text, "user");
    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => {
        appendMessage(data.response, "bot");
    })
    .catch(() => {
        appendMessage("Erro ao conectar com o servidor.", "bot");
    });
}

document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

/* ===========================
   RECONHECIMENTO DE VOZ
=========================== */

function initSpeech() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Reconhecimento de voz não suportado. Use Google Chrome.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "pt-BR";
    recognition.interimResults = false;

    recognition.onstart = function() {
        isRecording = true;
        micBtn.classList.add("recording");
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById("message").value = transcript;
    };

    recognition.onerror = function(event) {
        alert("Erro: " + event.error);
    };

    recognition.onend = function() {
        isRecording = false;
        micBtn.classList.remove("recording");
    };
}

micBtn.addEventListener("click", function() {

    if (!recognition) {
        initSpeech();
    }

    if (!recognition) return;

    if (isRecording) {
        recognition.stop();
    } else {
        recognition.start();
    }
});

</script>

</body>
</html>
